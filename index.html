<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Private Network</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --msg-sent: #4f46e5;
            --msg-received: #334155;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- Auth Screen --- */
        #auth-container {
            background: var(--sidebar-color);
            padding: 2rem;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin-bottom: 0.5rem; color: var(--accent-color); }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: #0f172a;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .toggle-link { color: #94a3b8; font-size: 0.8rem; cursor: pointer; margin-top: 15px; display: block;}

        /* --- Chat Interface --- */
        #app-container {
            display: none; 
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar-color);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            position: relative;
        }

        .header {
            padding: 15px;
            background: var(--sidebar-color);
            border-bottom: 1px solid #334155;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .messages-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--msg-sent);
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--msg-received);
            border-bottom-left-radius: 2px;
        }

        .sender-name {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 4px;
            display: block;
        }

        .input-area {
            padding: 20px;
            background: var(--sidebar-color);
            display: flex;
            gap: 10px;
        }

        #message-input { margin: 0; flex: 1; }
        #send-btn { width: auto; margin: 0; }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LOGIN / SIGNUP SCREEN -->
    <div id="auth-container">
        <h1>NEBULA</h1>
        <p style="font-size: 0.8rem; color: #94a3b8;">Private Encrypted Network</p>
        
        <div id="login-form">
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Enter Nebula</button>
            <span class="toggle-link" onclick="toggleAuth('signup')">Request Access (Sign Up)</span>
        </div>

        <div id="signup-form" class="hidden">
            <input type="text" id="signup-username" placeholder="Choose Username">
            <input type="password" id="signup-password" placeholder="Create Password">
            <input type="text" id="admin-key" placeholder="Admin Invite Key">
            <button onclick="handleSignup()">Request Access</button>
            <span class="toggle-link" onclick="toggleAuth('login')">Back to Login</span>
        </div>
        <p id="auth-error" style="color: #ef4444; font-size: 0.8rem;"></p>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-container" class="hidden">
        <div class="sidebar">
            <div class="header">
                <span>Nebula Network</span>
                <span style="cursor:pointer; font-size:0.8rem;" onclick="logout()">Logout</span>
            </div>
            <div style="padding: 20px; color: #94a3b8; font-size: 0.9rem;">
                <p>Connected as: <span id="current-user-display" style="color:white;"></span></p>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="header">Global Channel</div>
            <div id="messages-container" class="messages-list">
                <!-- Messages load here -->
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://prodnylvzjqgyorvbegw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb2RueWx2empxZ3lvcnZiZWd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDMyMjAsImV4cCI6MjA4ODgxOTIyMH0.tWh2ssi4SHs6rEqdk2Wm3VkrxkbbyRdLJ49JqYcA9dI';
        
        // THE SECRET KEY ONLY YOU KNOW
        const ADMIN_SECRET_KEY = "nebula-2024"; 

        // FIX: Renamed 'supabase' to 'supabaseClient' to avoid conflict with library
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. AUTHENTICATION LOGIC ---

        function toggleAuth(view) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('auth-error').innerText = "";
            
            if(view === 'signup') document.getElementById('signup-form').classList.remove('hidden');
            else document.getElementById('login-form').classList.remove('hidden');
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            const email = `${username}@nebula.local`;

            // Using supabaseClient instead of supabase
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                document.getElementById('auth-error').innerText = "Invalid credentials.";
            } else {
                initApp(data.user);
            }
        }

        async function handleSignup() {
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;
            const key = document.getElementById('admin-key').value;

            if (key !== ADMIN_SECRET_KEY) {
                document.getElementById('auth-error').innerText = "Invalid Admin Key. Access Denied.";
                return;
            }

            const email = `${username}@nebula.local`;

            // Using supabaseClient
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                     data: { username: username } 
                }
            });

            if (error) {
                document.getElementById('auth-error').innerText = error.message;
            } else {
                alert("Account created! Please login.");
                toggleAuth('login');
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // --- 3. APP LOGIC ---

        let currentUser = null;

        async function initApp(user) {
            currentUser = user;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('app-container').style.display = 'flex'; 
            
            document.getElementById('current-user-display').innerText = user.email.split('@')[0];
            
            loadMessages();
            subscribeToMessages();
        }

        async function loadMessages() {
            // Using supabaseClient
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*, profiles(username)')
                .order('created_at', { ascending: true });

            if (data) {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                data.forEach(msg => renderMessage(msg));
                scrollToBottom();
            }
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages-container');
            const isMe = msg.sender_id === currentUser.id;
            
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'sent' : 'received'}`;
            
            const nameTag = !isMe ? `<span class="sender-name">${msg.profiles.username}</span>` : '';
            
            div.innerHTML = `${nameTag}${msg.content}`;
            container.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;

            // Using supabaseClient
            const { error } = await supabaseClient
                .from('messages')
                .insert([{ content: content, sender_id: currentUser.id }]);

            if (!error) {
                input.value = '';
            } else {
                console.error("Error sending:", error);
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        function subscribeToMessages() {
            // Using supabaseClient
            supabaseClient
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    loadMessages(); 
                })
                .subscribe();
        }
    </script>
</body>
</html>
